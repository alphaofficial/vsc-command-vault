<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">Command Vault</title>
  <desc id="desc">A monochrome README header for Command Vault inspired by PMNDRS-style graphics.</desc>
  <defs>
    <linearGradient id="panel-glow" x1="160" y1="52" x2="720" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.03" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.12" />
    </linearGradient>
    <linearGradient id="soft-line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <rect width="920" height="260" fill="#050505" />

  <g opacity="0.8">
    <path d="M0 44H920" stroke="#111111" />
    <path d="M0 88H920" stroke="#101010" />
    <path d="M0 132H920" stroke="#111111" />
    <path d="M0 176H920" stroke="#101010" />
    <path d="M0 220H920" stroke="#111111" />
    <path d="M110 0V260" stroke="#101010" />
    <path d="M294 0V260" stroke="#111111" />
    <path d="M478 0V260" stroke="#101010" />
    <path d="M662 0V260" stroke="#111111" />
    <path d="M846 0V260" stroke="#101010" />
  </g>

  <circle cx="700" cy="64" r="84" fill="#ffffff" fill-opacity="0.05" filter="url(#blur)" />
  <circle cx="270" cy="200" r="70" fill="#ffffff" fill-opacity="0.04" filter="url(#blur)" />

  <rect x="44" y="36" width="832" height="188" rx="24" fill="#080808" stroke="url(#panel-glow)" />

  <g opacity="0.9">
    <path d="M86 72h116" stroke="#2b2b2b" stroke-width="2" stroke-linecap="round" />
    <path d="M86 95h74" stroke="#242424" stroke-width="2" stroke-linecap="round" />
    <path d="M86 118h92" stroke="#1d1d1d" stroke-width="2" stroke-linecap="round" />
    <path d="M720 183h102" stroke="#2b2b2b" stroke-width="2" stroke-linecap="round" />
    <path d="M752 206h70" stroke="#242424" stroke-width="2" stroke-linecap="round" />
  </g>

  <g transform="translate(82 152)">
    <rect x="0" y="0" width="114" height="30" rx="15" fill="#0f0f0f" stroke="#232323" />
    <circle cx="21" cy="15" r="4" fill="#f4f4f4" />
    <text x="36" y="20" fill="#d8d8d8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" letter-spacing="0.18em">RUN</text>
  </g>

  <g transform="translate(226 152)">
    <rect x="0" y="0" width="130" height="30" rx="15" fill="#0f0f0f" stroke="#232323" />
    <circle cx="21" cy="15" r="4" fill="#a7a7a7" />
    <text x="36" y="20" fill="#d8d8d8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" letter-spacing="0.18em">PASTE</text>
  </g>

  <g transform="translate(388 64)">
    <path d="M0 64c18-34 44-52 78-52 31 0 55 12 72 36 16 22 24 50 24 83" fill="none" stroke="url(#soft-line)" stroke-width="1.5" />
    <path d="M8 118c30-18 62-27 96-27 44 0 78 12 104 36" fill="none" stroke="url(#soft-line)" stroke-width="1.5" />
  </g>

  <text x="78" y="118" fill="#f8f8f8" font-family="Helvetica, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="-0.05em">command</text>
  <text x="78" y="166" fill="#7f7f7f" font-family="Helvetica, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="-0.05em">vault</text>

  <g transform="translate(586 70)">
    <rect x="0" y="0" width="222" height="116" rx="18" fill="#0c0c0c" stroke="#1f1f1f" />
    <text x="20" y="26" fill="#8c8c8c" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10" letter-spacing="0.22em">SEARCH COMMANDS</text>
    <rect x="20" y="40" width="182" height="18" rx="9" fill="#f4f4f4" />
    <rect x="20" y="70" width="154" height="8" rx="4" fill="#5f5f5f" />
    <rect x="20" y="86" width="124" height="8" rx="4" fill="#393939" />
  </g>

  <text x="810" y="60" text-anchor="end" fill="#6f6f6f" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10" letter-spacing="0.24em">VS CODE EXTENSION</text>
  <text x="810" y="204" text-anchor="end" fill="#f4f4f4" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" letter-spacing="0.22em">SAVE / SEARCH / RUN</text>
</svg>
