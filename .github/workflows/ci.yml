name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --out commandvault.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: commandvault-vsix
          path: commandvault.vsix
          if-no-files-found: error
